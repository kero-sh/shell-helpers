name: Testing and Release
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  bash-n:
    name: Bash N
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Running bash -n
        run: |
          find . -name '*.sh' -exec bash -n {} \;

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env: 
          SHELLCHECK_OPTS: "-x"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [bash-n, shellcheck]
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - test_bootstrap_colors.sh
          - test_color_variables.sh
          - test_compatibility.sh
          - test_get_log_level.sh
          - test_has_tty.sh
          - test_install_tools.sh
          - test_may_color.sh
          - test_new_functions.sh
          - test_parse_args.sh
          - test_sanitize.sh
          - test_spinners.sh
          - test_updated_functions.sh
          - test_urlencode.sh
          - test_verify_empty_file.sh
          - demo_ui.sh
    steps:
      - uses: actions/checkout@v5
      - name: Run ${{ matrix.test-file }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Running ${{ matrix.test-file }}"
          cd tests
          bash -e "${{ matrix.test-file }}"


  semver:
    name: Auto Tag (main)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.70.0        
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
